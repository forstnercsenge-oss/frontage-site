<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Get a free website review — Frontage</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#ffffff" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23111216'/%3E%3Crect x='10.5' y='10.5' width='11' height='11' rx='3.5' fill='none' stroke='white' stroke-width='2.4'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&family=Inter+Tight:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#f6f7f8; --ink:#111216; --ink-soft:#34353d; --muted:#6c6e77; --faint:#9a9ca3;
  --line:rgba(17,18,22,.09); --line-2:rgba(17,18,22,.14);
  --r-btn:14px; --r-card:24px;
  --ease:cubic-bezier(.22,.61,.36,1);
  --f:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --fd:'Inter Tight','Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--f);background:var(--bg);color:var(--ink);line-height:1.5;letter-spacing:-0.011em;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
a{color:inherit;text-decoration:none}
::selection{background:var(--ink);color:#fff}

/* breathing wash */
.wash{position:fixed;inset:-8%;z-index:0;pointer-events:none;animation:sky 30s ease-in-out infinite;
  background:
    radial-gradient(38% 42% at 4% 6%, rgba(176,158,255,.30), transparent 58%),
    radial-gradient(40% 46% at 100% 30%, rgba(120,170,255,.22), transparent 58%),
    radial-gradient(46% 50% at 70% 104%, rgba(255,182,150,.20), transparent 58%)}
@keyframes sky{0%,100%{transform:scale(1.02) translate3d(0,0,0)}50%{transform:scale(1.07) translate3d(1.4%,-1%,0)}}

.top{position:relative;z-index:2}
.top-inner{max-width:640px;margin:0 auto;padding:26px 24px 0;display:flex;align-items:center;justify-content:space-between}
.brand{font-family:var(--fd);font-weight:600;font-size:18px;letter-spacing:-0.03em;display:flex;align-items:center;gap:9px}
.brand .mark{width:24px;height:24px;border-radius:7px;background:var(--ink);display:grid;place-items:center}
.brand .mark::after{content:"";width:9px;height:9px;border:2px solid #fff;border-radius:3px}
.back{font-size:14px;color:var(--muted);display:inline-flex;align-items:center;gap:7px;transition:color .15s}
.back:hover{color:var(--ink)}

main{position:relative;z-index:2;flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px 56px}
.card{
  width:100%;max-width:560px;border-radius:var(--r-card);padding:40px;
  background:linear-gradient(160deg, rgba(255,255,255,.92), rgba(255,255,255,.74));
  backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);
  border:1px solid rgba(255,255,255,.9);
  box-shadow:inset 0 2px 1px rgba(255,255,255,1),inset 0 0 0 1px rgba(255,255,255,.5),0 40px 80px -34px rgba(28,46,104,.4),0 12px 28px -16px rgba(28,46,104,.22);
  position:relative;overflow:hidden;
}
.card::after{content:"";position:absolute;inset:0;border-radius:inherit;padding:1.1px;pointer-events:none;
  background:linear-gradient(130deg, rgba(255,182,202,.5), rgba(202,188,255,.46) 52%, rgba(160,208,255,.46) 80%, rgba(170,236,218,.38));
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:.5}
.card h1{font-family:var(--fd);font-weight:600;font-size:clamp(26px,4.6vw,34px);letter-spacing:-0.035em;line-height:1.04}
.card .lead{color:var(--muted);font-size:15.5px;margin-top:12px;line-height:1.5}

form{margin-top:28px;display:flex;flex-direction:column;gap:18px}
.field label{display:block;font-size:13.5px;font-weight:500;color:var(--ink-soft);margin-bottom:7px}
.field label .opt{color:var(--faint);font-weight:450}
.field input,.field textarea{
  width:100%;font-family:inherit;font-size:15px;color:var(--ink);
  background:rgba(255,255,255,.7);border:1px solid var(--line-2);border-radius:12px;
  padding:13px 14px;transition:border-color .15s, box-shadow .15s, background .15s;
}
.field textarea{min-height:96px;resize:vertical}
.field input::placeholder,.field textarea::placeholder{color:var(--faint)}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--ink);background:#fff;box-shadow:0 0 0 3px rgba(17,18,22,.06)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;height:54px;border-radius:var(--r-btn);font-family:var(--fd);font-weight:600;font-size:15.5px;letter-spacing:-0.01em;border:none;cursor:pointer;background:var(--ink);color:#fff;box-shadow:0 10px 24px -10px rgba(17,18,22,.5);transition:transform .18s var(--ease),box-shadow .18s,opacity .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 18px 36px -12px rgba(17,18,22,.6)}
.btn:disabled{opacity:.6;cursor:default;transform:none}
.fine{font-size:12.5px;color:var(--faint);text-align:center;margin-top:4px}
.err{display:none;font-size:13.5px;color:#c0322b;background:#fdecea;border:1px solid #f6c9c4;border-radius:10px;padding:11px 13px}

/* success */
.success{display:none;text-align:center;padding:14px 0}
.success .tick{width:60px;height:60px;border-radius:50%;background:var(--ink);display:grid;place-items:center;margin:0 auto 22px}
.success .tick svg{width:28px;height:28px;color:#fff}
.success h2{font-family:var(--fd);font-weight:600;font-size:26px;letter-spacing:-0.03em}
.success p{color:var(--muted);font-size:15.5px;margin:12px auto 26px;max-width:360px;line-height:1.5}
.success a.home{display:inline-flex;align-items:center;gap:8px;font-size:14.5px;font-weight:500;color:var(--ink);border:1px solid var(--line-2);border-radius:var(--r-btn);height:48px;padding:0 22px}
.success a.home:hover{border-color:var(--ink)}

footer{position:relative;z-index:2;text-align:center;padding:20px;font-size:12.5px;color:var(--faint)}

@media(max-width:560px){
  .card{padding:30px 22px}
  main{padding:28px max(18px,env(safe-area-inset-left)) 44px max(18px,env(safe-area-inset-right))}
  .top-inner{padding-left:max(20px,env(safe-area-inset-left));padding-right:max(20px,env(safe-area-inset-right))}
  .btn{width:100%}            /* full-width submit — solid tap target on phones */
  .card h1{font-size:clamp(24px,6.4vw,30px);line-height:1.1}
}
</style>
</head>
<body>
<div class="wash"></div>

<div class="top">
  <div class="top-inner">
    <a class="brand" href="index.html"><span class="mark"></span>Frontage</a>
    <a class="back" href="index.html"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>Back</a>
  </div>
</div>

<main>
  <div class="card">
    <div id="formWrap">
      <h1>Get a free website review.</h1>
      <p class="lead">Tell us a little about your business and we'll send back honest, specific notes on your online presence — within one business day. No pressure, no jargon.</p>

      <form id="reviewForm" action="https://formsubmit.co/hello@frontage.co" method="POST">
        <!-- FormSubmit (no account / no key needed) -->
        <input type="hidden" name="_subject" value="New website review request — Frontage" />
        <input type="hidden" name="_next" value="https://frontage.co/thanks.html" />
        <input type="hidden" name="_captcha" value="false" />
        <input type="hidden" name="_template" value="table" />
        <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off" />

        <div class="field">
          <label for="business_name">Business name</label>
          <input id="business_name" name="business_name" type="text" placeholder="e.g. Harbour Goods" required />
        </div>
        <div class="field">
          <label for="business_link">Link to your business <span class="opt">— website, Instagram, or Google listing</span></label>
          <input id="business_link" name="business_link" type="text" placeholder="e.g. instagram.com/harbourgoods" required />
        </div>
        <div class="field">
          <label for="business_type">What does your business do?</label>
          <input id="business_type" name="business_type" type="text" placeholder="e.g. Neighbourhood homeware shop" required />
        </div>
        <div class="field">
          <label for="email">Your email <span class="opt">— so we can send your review</span></label>
          <input id="email" name="email" type="email" placeholder="you@business.com" required />
        </div>
        <div class="field">
          <label for="message">Anything else? <span class="opt">— optional</span></label>
          <textarea id="message" name="message" placeholder="Anything you'd like us to look at."></textarea>
        </div>

        <button class="btn" type="submit" id="submitBtn">Request my free review
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M3 8h9M8 4l4 4-4 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="fine">We reply within one business day. Your details stay private.</div>
      </form>
    </div>

  </div>
</main>

<footer>© 2026 Frontage</footer>

<script>
const form = document.getElementById('reviewForm');
const btn = document.getElementById('submitBtn');
form.addEventListener('submit', () => { btn.disabled = true; btn.textContent = 'Sending…'; });
</script>
</body>
</html>
