<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Thanks — Frontage</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#ffffff" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23111216'/%3E%3Crect x='10.5' y='10.5' width='11' height='11' rx='3.5' fill='none' stroke='white' stroke-width='2.4'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&family=Inter+Tight:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
:root{--bg:#f6f7f8;--ink:#111216;--muted:#6c6e77;--line-2:rgba(17,18,22,.14);--r-btn:14px;--r-card:24px;
  --f:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--fd:'Inter Tight','Inter',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--f);background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-x:hidden;letter-spacing:-0.011em}
a{color:inherit;text-decoration:none}
.wash{position:fixed;inset:-8%;z-index:0;pointer-events:none;animation:sky 30s ease-in-out infinite;
  background:radial-gradient(38% 42% at 6% 8%, rgba(176,158,255,.30), transparent 58%),radial-gradient(40% 46% at 98% 30%, rgba(120,170,255,.22), transparent 58%),radial-gradient(46% 50% at 70% 104%, rgba(255,182,150,.20), transparent 58%)}
@keyframes sky{0%,100%{transform:scale(1.02)}50%{transform:scale(1.07) translate3d(1.4%,-1%,0)}}
.card{position:relative;z-index:2;width:100%;max-width:480px;border-radius:var(--r-card);padding:48px 40px;text-align:center;
  background:linear-gradient(160deg, rgba(255,255,255,.92), rgba(255,255,255,.74));backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);
  border:1px solid rgba(255,255,255,.9);box-shadow:inset 0 2px 1px rgba(255,255,255,1),0 40px 80px -34px rgba(28,46,104,.4),0 12px 28px -16px rgba(28,46,104,.22)}
.tick{width:64px;height:64px;border-radius:50%;background:var(--ink);display:grid;place-items:center;margin:0 auto 24px}
.tick svg{width:30px;height:30px;color:#fff}
h1{font-family:var(--fd);font-weight:600;font-size:30px;letter-spacing:-0.035em}
p{color:var(--muted);font-size:16px;margin:14px auto 28px;max-width:340px;line-height:1.55}
.home{display:inline-flex;align-items:center;gap:8px;font-family:var(--fd);font-weight:600;font-size:15px;color:#fff;background:var(--ink);border-radius:var(--r-btn);height:50px;padding:0 24px;box-shadow:0 10px 24px -10px rgba(17,18,22,.5);transition:transform .18s}
.home:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<div class="wash"></div>
<div class="card">
  <div class="tick"><svg viewBox="0 0 16 16" fill="none"><path d="M3.5 8.5l3 3 6-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <h1>Thanks — that's in.</h1>
  <p>We've got your details and we'll be in touch within one business day with your free website review.</p>
  <a class="home" href="index.html">Back to home
    <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M3 8h9M8 4l4 4-4 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </a>
</div>
</body>
</html>
